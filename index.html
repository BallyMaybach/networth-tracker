<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Networth">
<meta name="theme-color" content="#1a1a1a">
<title>Networth Tracker</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-light-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-dark-180.png"   media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-tinted-180.png" media="(prefers-color-scheme: dark) and (dynamic-range: high)">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root {
  --bg: #1a1a1a;
  --bg-elev: #232323;
  --surface: #262626;
  --surface-2: #303030;
  --surface-3: #3a3a3a;
  --accent: #7FB069;
  --accent-dim: #6A9A56;
  --accent-soft: rgba(127, 176, 105, 0.12);
  --success: #7FB069;
  --success-soft: rgba(127, 176, 105, 0.15);
  --danger: #E07856;
  --text: #F5F4EE;
  --text-dim: #A09E9C;
  --text-muted: #6B6967;
  --border: #333333;
  --border-soft: #2a2a2a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
}

button, input, select, textarea { font: inherit; color: inherit; }

button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: inherit;
}

input[type="number"],
input[type="text"],
input[type="date"],
input[type="email"],
input[type="password"] {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  width: 100%;
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
  font-variant-numeric: tabular-nums;
}
input[type="date"] { font-family: inherit; }
input::placeholder { color: var(--text-muted); }
input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface-3);
}

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }

.app {
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  min-height: 100vh;
  min-height: 100dvh;
}

/* === LOADING OVERLAY === */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === AUTH SCREEN === */
.auth-screen {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
}
.auth-logo {
  margin-bottom: 32px;
  text-align: center;
}
.auth-logo-dot {
  width: 48px; height: 48px;
  background: var(--accent-soft);
  border: 1px solid rgba(127,176,105,0.3);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
}
.auth-logo-dot svg { width: 24px; height: 24px; color: var(--accent); }
.auth-logo h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
.auth-logo p { font-size: 13px; color: var(--text-muted); margin: 0; }
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 360px;
}
.auth-card h2 { margin: 0 0 20px; font-size: 17px; font-weight: 600; }
.auth-field { margin-bottom: 12px; }
.auth-field label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 500;
}
.auth-error {
  background: rgba(224, 120, 86, 0.12);
  border: 1px solid rgba(224, 120, 86, 0.3);
  border-radius: 10px;
  color: var(--danger);
  font-size: 13px;
  padding: 10px 12px;
  margin-bottom: 14px;
  display: none;
}
.auth-error.show { display: block; }
.auth-submit {
  width: 100%;
  height: 48px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  font-weight: 600;
  margin-top: 4px;
  cursor: pointer;
  transition: background .15s;
}
.auth-submit:active { background: var(--accent-dim); }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-toggle {
  margin-top: 16px;
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
}
.auth-toggle button {
  color: var(--accent);
  font-weight: 500;
  text-decoration: none;
  margin-left: 4px;
}

/* === HOME === */
.home { padding-bottom: calc(120px + var(--safe-bottom)); }

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 4px;
}
.app-title {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  margin: 0;
}
.app-title .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 6px;
  vertical-align: middle;
}

.hero { padding: 8px 20px 16px; }
.hero-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: 0 0 4px;
  font-weight: 500;
}
.hero-value {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: -1.2px;
  margin: 0;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.hero-delta {
  margin-top: 8px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.delta-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.delta-pos { background: var(--success-soft); color: var(--success); }
.delta-neg { background: rgba(224, 120, 86, 0.14); color: var(--danger); }
.delta-neutral { background: var(--surface-2); color: var(--text-dim); }
.hero-delta-meta { color: var(--text-muted); font-size: 13px; }

.chart-wrap {
  margin: 4px 0 20px;
  padding: 0 12px;
  height: 180px;
}
.chart-wrap svg { display: block; width: 100%; height: 100%; }
.chart-empty {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 14px;
  border: 1px dashed var(--border);
  border-radius: 12px;
}

.chart-tabs {
  display: flex;
  gap: 6px;
  padding: 0 16px;
  margin-top: 10px;
  margin-bottom: 20px;
}
.chart-tab {
  flex: 1;
  height: 32px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, color .15s, border-color .15s;
}
.chart-tab.active {
  background: var(--accent-soft);
  border-color: rgba(127,176,105,0.3);
  color: var(--accent);
  font-weight: 600;
}

.breakdown-val-col {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
}
.breakdown-delta {
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
.breakdown-delta.delta-pos { color: var(--success); background: none; }
.breakdown-delta.delta-neg { color: var(--danger); background: none; }

.section { padding: 0 16px; margin-bottom: 18px; }
.section-title {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin: 0 4px 10px;
  font-weight: 600;
}

.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-soft);
}

.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
}
.breakdown-row + .breakdown-row { border-top: 1px solid var(--border-soft); }
.breakdown-label { color: var(--text-dim); font-size: 14px; }
.breakdown-value { font-weight: 600; font-variant-numeric: tabular-nums; font-size: 15px; }
.breakdown-row.total .breakdown-label { color: var(--text); font-weight: 600; }
.breakdown-row.total .breakdown-value { color: var(--accent); font-size: 16px; font-weight: 700; }

.entry-list { display: flex; flex-direction: column; gap: 8px; }
.entry-item {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 10px 8px 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.entry-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.entry-date { font-size: 12px; color: var(--text-dim); }
.entry-value { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
.entry-delta {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.entry-delta.delta-pos { color: var(--success); background: none; }
.entry-delta.delta-neg { color: var(--danger); background: none; }
.entry-delta.delta-neutral { color: var(--text-muted); background: none; }
.entry-actions { display: flex; gap: 0; flex-shrink: 0; }
.icon-btn {
  width: 44px; height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 16px;
  transition: background .15s, color .15s;
}
.icon-btn:active { background: var(--surface-2); color: var(--text); }
.icon-btn.danger:active { color: var(--danger); }

button svg { width: 18px; height: 18px; flex-shrink: 0; display: block; }
.btn svg { width: 16px; height: 16px; }
.back-btn svg { width: 22px; height: 22px; }
.icon-btn svg { width: 18px; height: 18px; }

.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
  font-size: 14px;
  border: 1px dashed var(--border);
  border-radius: 12px;
}

.fab {
  position: fixed;
  right: calc(20px + var(--safe-right));
  bottom: calc(20px + var(--safe-bottom));
  background: var(--accent);
  color: white;
  border-radius: 28px;
  height: 56px;
  padding: 0 22px 0 18px;
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.45), 0 4px 10px rgba(127, 176, 105, 0.3);
  z-index: 50;
  transition: transform .12s, background .15s;
  min-height: 44px;
}
.fab:active { background: var(--accent-dim); transform: translateY(1px) scale(0.98); }
.fab .plus { font-size: 22px; line-height: 1; font-weight: 400; }

.backup-actions { display: flex; gap: 8px; }
.btn {
  flex: 1;
  height: 46px;
  border-radius: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-weight: 500;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 44px;
  padding: 0 14px;
}
.btn:active { background: var(--surface-2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.primary:active { background: var(--accent-dim); }
.btn.ghost { background: transparent; }
.btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
.btn.danger:active { background: #C66345; }

.hint { margin-top: 8px; font-size: 12px; color: var(--text-muted); padding: 0 4px; }

/* === ENTRY / SETTINGS VIEW === */
.entry-view {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}
.entry-view.active { display: flex; }

.entry-header {
  display: flex;
  align-items: center;
  padding: 6px 12px 6px 6px;
  gap: 4px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
  border-bottom: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.entry-header.scrolled {
  background: rgba(26,26,26,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom-color: var(--border-soft);
}
.back-btn {
  width: 44px; height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  color: var(--text);
}
.back-btn:active { background: var(--surface); }
.entry-title { font-size: 17px; font-weight: 600; flex: 1; }

.entry-form { padding: 4px 16px 24px; flex: 1; }

.form-section {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
}
.form-section h3 {
  margin: 0 0 12px;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-section h3 .badge {
  background: var(--surface-2);
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: 0;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 500;
}
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 500;
}
.field .help { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.row { display: flex; gap: 8px; align-items: flex-end; }
.row .field { flex: 1; margin-bottom: 0; }

.other-item {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  align-items: center;
}
.other-item .name { flex: 1.4; }
.other-item .amount { flex: 1; min-width: 0; }
.other-item .icon-btn { flex-shrink: 0; }

.add-row-btn {
  width: 100%;
  height: 44px;
  border: 1px dashed var(--border);
  border-radius: 11px;
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 500;
  margin-top: 4px;
}
.add-row-btn:active { background: var(--surface-2); color: var(--text); }

.preview {
  background: linear-gradient(135deg, rgba(127,176,105,0.08), rgba(127,176,105,0.02));
  border: 1px solid rgba(127,176,105,0.25);
}
.preview h3 { color: var(--accent); }
.preview .breakdown-row + .breakdown-row { border-top: 1px solid rgba(127,176,105,0.15); }

.entry-actions-bar {
  position: sticky;
  bottom: 0;
  background: linear-gradient(to top, var(--bg) 70%, rgba(26,26,26,0));
  padding: 12px 16px calc(16px + var(--safe-bottom));
  display: flex;
  gap: 8px;
  margin-top: auto;
}

/* Toast */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(100px + var(--safe-bottom));
  transform: translateX(-50%) translateY(8px);
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 300;
  padding: 24px;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  max-width: 340px;
  width: 100%;
}
.modal h3 { margin: 0 0 8px; font-size: 17px; font-weight: 600; }
.modal p { margin: 0 0 18px; color: var(--text-dim); font-size: 14px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions .btn { flex: 1; }

.file-input { display: none; }

.entry-view.active {
  animation: slideUp .25s cubic-bezier(0.32, 0.72, 0.4, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0.6; }
  to { transform: translateY(0); opacity: 1; }
}

/* Logout row in settings */
.logout-section {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 4px 14px;
  margin-bottom: 14px;
}
.logout-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
}
.logout-row span { font-size: 14px; color: var(--text-dim); }
.logout-btn {
  font-size: 14px;
  font-weight: 500;
  color: var(--danger);
  padding: 6px 12px;
  border-radius: 8px;
  background: rgba(224, 120, 86, 0.1);
  border: 1px solid rgba(224, 120, 86, 0.2);
}
.logout-btn:active { background: rgba(224, 120, 86, 0.2); }

@media (max-width: 360px) {
  .hero-value { font-size: 36px; }
  .hero { padding: 8px 16px 12px; }
  .section { padding: 0 12px; }
  .entry-form { padding: 4px 12px 24px; }
}

@media (hover: hover) {
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .btn:hover { background: var(--surface-2); }
  .btn.primary:hover { background: var(--accent-dim); }
  .fab:hover { background: var(--accent-dim); }
}
</style>
</head>
<body>

<div id="app" class="app"></div>
<div id="toast" class="toast"></div>
<div id="modal" class="modal-backdrop">
  <div class="modal">
    <h3 id="modalTitle">Eintrag löschen?</h3>
    <p id="modalText">Dieser Eintrag wird dauerhaft entfernt.</p>
    <div class="modal-actions">
      <button class="btn ghost" id="modalCancel">Abbrechen</button>
      <button class="btn danger" id="modalConfirm">Löschen</button>
    </div>
  </div>
</div>
<input type="file" id="fileInput" class="file-input" accept="application/json,.json">

<script>
/* ============================================================
   NETWORTH TRACKER — localStorage backend
   ============================================================ */

/* ---------- Helpers ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function uid() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}
function num(v) {
  if (v === null || v === undefined || v === '') return 0;
  const n = typeof v === 'number' ? v : parseFloat(String(v).replace(',', '.'));
  return isFinite(n) ? n : 0;
}
const fmtEUR = (n) => new Intl.NumberFormat('de-DE', {
  style: 'currency', currency: 'EUR', maximumFractionDigits: 0, minimumFractionDigits: 0
}).format(n || 0);
const fmtEUR2 = (n) => new Intl.NumberFormat('de-DE', {
  style: 'currency', currency: 'EUR', maximumFractionDigits: 2, minimumFractionDigits: 0
}).format(n || 0);
const fmtSigned = (n) => (n >= 0 ? '+' : '') + fmtEUR(n);
const fmtPct = (n) => (n >= 0 ? '+' : '') + (n).toFixed(1) + '%';
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtDateLabel(iso) {
  const today = todayISO();
  if (iso === today) return 'Heute';
  const d = new Date();
  const yISO = new Date(d.getTime() - d.getTimezoneOffset() * 60000 - 86400000).toISOString().slice(0, 10);
  if (iso === yISO) return 'Gestern';
  return fmtDate(iso);
}
function bdDelta(curr, prevVal) {
  if (prevVal === null || prevVal === undefined) return '';
  const d = curr - prevVal;
  if (d === 0) return '';
  const cls = d > 0 ? 'delta-pos' : 'delta-neg';
  return `<span class="breakdown-delta ${cls}">${fmtSigned(d)}</span>`;
}
function todayISO() {
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* ---------- Calculations ---------- */
function computeMyPortfolio(total, profit, myInvest) {
  const cost = total - profit;
  if (cost <= 0) return 0;
  let share = num(myInvest) / cost;
  if (share > 1) share = 1;
  if (share < 0) share = 0;
  return share * total;
}
function computeBreakdown(data) {
  const myPortfolio = computeMyPortfolio(num(data.portfolio.total), num(data.portfolio.profit), num(data.myInvest));
  const liquid = num(data.liquid.account) + num(data.liquid.cash) + num(data.liquid.paypal);
  const other = (data.other || []).reduce((s, x) => s + num(x.value), 0);
  return { myPortfolio, liquid, other, total: myPortfolio + liquid + other };
}

/* ---------- localStorage store ---------- */
const STORAGE_KEY = 'nw_entries';

function normalizeEntry(e) {
  return {
    id: e.id || uid(),
    date: e.date,
    portfolio: { total: num(e.portfolio && e.portfolio.total), profit: num(e.portfolio && e.portfolio.profit) },
    myInvest: num(e.myInvest),
    liquid: { account: num(e.liquid && e.liquid.account), cash: num(e.liquid && e.liquid.cash), paypal: num(e.liquid && e.liquid.paypal) },
    other: Array.isArray(e.other) ? e.other.map(o => ({ name: String(o.name || ''), value: num(o.value) })) : [],
    createdAt: e.createdAt || new Date().toISOString(),
    updatedAt: e.updatedAt || new Date().toISOString()
  };
}

function readStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function writeStore(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
}

function loadAll() {
  const arr = readStore().map(normalizeEntry);
  arr.sort((a, b) => a.date < b.date ? -1 : (a.date > b.date ? 1 : 0));
  return arr.map(e => ({ ...e, computed: computeBreakdown(e) }));
}

function saveEntry(entry) {
  const clean = normalizeEntry(entry);
  clean.updatedAt = new Date().toISOString();
  const arr = readStore();
  const i = arr.findIndex(x => x.id === clean.id);
  if (i >= 0) arr[i] = clean; else arr.push(clean);
  writeStore(arr);
}

function deleteEntryById(id) {
  writeStore(readStore().filter(x => x.id !== id));
}

/* ---------- Modal ---------- */
function confirmModal({ title, text, confirmLabel = 'Löschen', danger = true }) {
  return new Promise((resolve) => {
    const m = $('#modal');
    $('#modalTitle').textContent = title;
    $('#modalText').textContent = text;
    const btn = $('#modalConfirm');
    btn.textContent = confirmLabel;
    btn.className = 'btn ' + (danger ? 'danger' : 'primary');
    m.classList.add('active');
    const cleanup = (val) => {
      m.classList.remove('active');
      btn.removeEventListener('click', onYes);
      $('#modalCancel').removeEventListener('click', onNo);
      m.removeEventListener('click', onBackdrop);
      resolve(val);
    };
    const onYes = () => cleanup(true);
    const onNo = () => cleanup(false);
    const onBackdrop = (e) => { if (e.target === m) cleanup(false); };
    btn.addEventListener('click', onYes);
    $('#modalCancel').addEventListener('click', onNo);
    m.addEventListener('click', onBackdrop);
  });
}

/* ---------- Chart ---------- */
function linePath(pts) {
  if (pts.length < 2) return '';
  return pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' ');
}
function renderChart(container, entries, mode = 'total') {
  container.innerHTML = '';
  if (entries.length === 0) { container.innerHTML = '<div class="chart-empty">Noch keine Einträge</div>'; return; }
  if (entries.length === 1) { container.innerHTML = '<div class="chart-empty">Mindestens 2 Einträge für den Verlauf</div>'; return; }
  const W = container.clientWidth || 320;
  const H = container.clientHeight || 180;
  const pad = { top: 16, right: 10, bottom: 16, left: 10 };
  const modeMap = {
    total:     { fn: e => e.computed.total },
    portfolio: { fn: e => e.computed.myPortfolio },
    liquid:    { fn: e => e.computed.liquid }
  };
  const valFn = (modeMap[mode] || modeMap.total).fn;
  const sc = '#7FB069';
  const totals = entries.map(valFn);
  const dates = entries.map(e => new Date(e.date + 'T00:00:00').getTime());
  const minV = Math.min(...totals), maxV = Math.max(...totals);
  const minD = Math.min(...dates), maxD = Math.max(...dates);
  const valRange = (maxV - minV) || 1;
  const dateRange = (maxD - minD) || 1;
  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;
  const points = entries.map((e, i) => ({
    x: pad.left + (entries.length === 1 ? innerW / 2 : ((dates[i] - minD) / dateRange) * innerW),
    y: maxV === minV ? pad.top + innerH / 2 : pad.top + (1 - (totals[i] - minV) / valRange) * innerH
  }));
  const chartPath = linePath(points);
  const last = points[points.length - 1], first = points[0];
  const areaPath = chartPath + ` L ${last.x.toFixed(2)} ${(H-2).toFixed(2)} L ${first.x.toFixed(2)} ${(H-2).toFixed(2)} Z`;
  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="nwGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${sc}" stop-opacity="0.45"/>
          <stop offset="60%" stop-color="${sc}" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="${sc}" stop-opacity="0"/>
        </linearGradient>
        <filter id="nwGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="${areaPath}" fill="url(#nwGrad)"/>
      <path d="${chartPath}" fill="none" stroke="${sc}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last.x.toFixed(2)}" cy="${last.y.toFixed(2)}" r="4" fill="${sc}" filter="url(#nwGlow)"/>
      <circle cx="${last.x.toFixed(2)}" cy="${last.y.toFixed(2)}" r="2" fill="#1a1a1a"/>
    </svg>`;
}

/* ---------- Render: Home ---------- */
function renderHome() {
  const entries = state.entries;
  const reversed = [...entries].reverse();
  const last = entries[entries.length - 1];

  let deltaHTML = '';
  if (last && prev) {
    const d = last.computed.total - prev.computed.total;
    const pct = prev.computed.total !== 0 ? (d / prev.computed.total) * 100 : 0;
    const cls = d > 0 ? 'delta-pos' : (d < 0 ? 'delta-neg' : 'delta-neutral');
    const sign = d > 0 ? '▲' : (d < 0 ? '▼' : '·');
    deltaHTML = `<div class="hero-delta"><span class="delta-pill ${cls}">${sign} ${fmtSigned(d)}</span><span class="hero-delta-meta">${fmtPct(pct)} seit ${fmtDate(prev.date)}</span></div>`;
  } else if (last) {
    deltaHTML = `<div class="hero-delta"><span class="hero-delta-meta">Erster Eintrag · ${fmtDate(last.date)}</span></div>`;
  } else {
    deltaHTML = `<div class="hero-delta"><span class="hero-delta-meta">Noch keine Einträge</span></div>`;
  }

  const breakdown = last ? last.computed : { myPortfolio: 0, liquid: 0, other: 0, total: 0 };
  const prevBreakdown = prev ? prev.computed : null;

  const entriesHTML = reversed.length === 0
    ? `<div class="empty-state">Noch keine Einträge.<br>Tippe „+ Eintrag" unten rechts.</div>`
    : reversed.map((e, idx) => {

            </div>
          </div>`;
      }).join('');

  return `
    <div class="home">
      <div class="app-header">
        <p class="app-title"><span class="dot"></span>Networth</p>
      </div>
      <div class="hero">
        <h1 class="hero-value">${fmtEUR(breakdown.total)}</h1>
        ${deltaHTML}
      </div>
      <div class="chart-wrap" id="chart"></div>
      <div class="chart-tabs">
        <button class="chart-tab${state.chartMode==='total'?' active':''}" data-mode="total">Gesamt</button>
        <button class="chart-tab${state.chartMode==='portfolio'?' active':''}" data-mode="portfolio">Portfolio</button>
        <button class="chart-tab${state.chartMode==='liquid'?' active':''}" data-mode="liquid">Liquide</button>
      </div>
      <div class="section">
        <p class="section-title">Aufteilung</p>
        <div class="card">
          <div class="breakdown-row">
            <span class="breakdown-label">Portfolio (mein Anteil)</span>
            <div class="breakdown-val-col"><span class="breakdown-value">${fmtEUR(breakdown.myPortfolio)}</span>${bdDelta(breakdown.myPortfolio, prevBreakdown && prevBreakdown.myPortfolio)}</div>
          </div>
          <div class="breakdown-row">
            <span class="breakdown-label">Liquide</span>
            <div class="breakdown-val-col"><span class="breakdown-value">${fmtEUR(breakdown.liquid)}</span>${bdDelta(breakdown.liquid, prevBreakdown && prevBreakdown.liquid)}</div>
          </div>
          <div class="breakdown-row">
            <span class="breakdown-label">Sonstiges</span>
            <div class="breakdown-val-col"><span class="breakdown-value">${fmtEUR(breakdown.other)}</span>${bdDelta(breakdown.other, prevBreakdown && prevBreakdown.other)}</div>
          </div>
          <div class="breakdown-row total">
            <span class="breakdown-label">Gesamt</span>
            <div class="breakdown-val-col"><span class="breakdown-value">${fmtEUR(breakdown.total)}</span>${bdDelta(breakdown.total, prevBreakdown && prevBreakdown.total)}</div>
          </div>
        </div>
      </div>
      <div class="section">
        <p class="section-title">Einträge${entries.length ? ' · ' + entries.length : ''}</p>

  $('#fab') && $('#fab').addEventListener('click', () => openEntry(null));

  $$('[data-del]').forEach(b => b.addEventListener('click', async (e) => {
    const id = e.currentTarget.dataset.del;
    const entry = state.entries.find(x => x.id === id);

    const ok = await confirmModal({ title: 'Eintrag löschen?', text: `Eintrag vom ${fmtDate(entry.date)} (${fmtEUR(entry.computed.total)}) wird dauerhaft entfernt.` });
    if (ok) {
      try {
        await deleteEntryById(id);
        toast('Eintrag gelöscht');
        await refresh();
      } catch (err) {
        toast('Fehler beim Löschen');
      }
    }
  }));
  $('#btnExport') && $('#btnExport').addEventListener('click', exportJSON);
  $('#btnImport') && $('#btnImport').addEventListener('click', () => $('#fileInput').click());
  $$('[data-mode]').forEach(btn => btn.addEventListener('click', (e) => {
    state.chartMode = e.currentTarget.dataset.mode;
    $$('.chart-tab').forEach(t => t.classList.remove('active'));
    e.currentTarget.classList.add('active');
    renderChart($('#chart'), state.entries, state.chartMode);

}

  const view = $('#entryView');
  const header = $('#entryHeader');
  view.addEventListener('scroll', () => { header.classList.toggle('scrolled', view.scrollTop > 4); });
  $('#backBtn').addEventListener('click', closeEntry);
  $('#cancelBtn').addEventListener('click', closeEntry);
  $('#saveBtn').addEventListener('click', persistDraft);
  $('#f_date').addEventListener('change', (e) => { state.draft.date = e.target.value || todayISO(); saveDraftLocal(); });
  const wire = (sel, path) => {
    $(sel).addEventListener('input', (e) => {
      const parts = path.split('.');
      let obj = state.draft;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length - 1]] = e.target.value;
      renderPreview();
    });
  };
  wire('#f_p_total', 'portfolio.total');
  wire('#f_p_profit', 'portfolio.profit');
  wire('#f_p_invest', 'myInvest');
  wire('#f_l_account', 'liquid.account');
  wire('#f_l_cash', 'liquid.cash');
  wire('#f_l_paypal', 'liquid.paypal');
  $('#addOther').addEventListener('click', () => {
    state.draft.other.push({ name: '', value: '' });
    refreshOtherList();
    renderPreview();
    requestAnimationFrame(() => {
      const inputs = $$('#otherList .other-item .name');
      inputs[inputs.length - 1] && inputs[inputs.length - 1].focus();
    });
  });
  bindOtherListEvents();
}

function refreshOtherList() {
  $('#otherList').innerHTML = renderOtherItems(state.draft.other);
  bindOtherListEvents();
}

function bindOtherListEvents() {
  $$('#otherList .other-item').forEach(row => {
    const idx = +row.dataset.idx;
    row.querySelector('.name').addEventListener('input', (e) => { state.draft.other[idx].name = e.target.value; saveDraftLocal(); });
    row.querySelector('.amount').addEventListener('input', (e) => { state.draft.other[idx].value = e.target.value; renderPreview(); });
    row.querySelector('[data-del-other]').addEventListener('click', () => { state.draft.other.splice(idx, 1); refreshOtherList(); renderPreview(); });
  });
}

function openEntry(id) {
  if (id) {
    const e = state.entries.find(x => x.id === id);
    if (!e) return;
    state.editingId = id;
    state.draft = JSON.parse(JSON.stringify({ id: e.id, date: e.date, portfolio: e.portfolio, myInvest: e.myInvest, liquid: e.liquid, other: e.other || [], createdAt: e.createdAt || new Date().toISOString() }));
  } else {
    state.editingId = null;
    state.draft = freshDraft();
  }
  state.view = 'entry';
  render();
  try { history.pushState({ view: 'entry' }, '', '#entry'); } catch (e) {}
}

function closeEntry() {
  clearDraftLocal();
  state.view = 'home';
  state.draft = null;
  state.editingId = null;
  render();
  try { if (location.hash === '#entry') history.back(); } catch (e) {}
}

window.addEventListener('popstate', () => {
  if (state.view === 'entry') { clearDraftLocal(); state.view = 'home'; state.draft = null; state.editingId = null; render(); }
});

async function persistDraft() {
  const d = state.draft;
  if (!d.date) { toast('Bitte ein Datum wählen'); return; }
  const clean = {
    id: d.id,
    date: d.date,
    portfolio: { total: num(d.portfolio.total), profit: num(d.portfolio.profit) },
    myInvest: num(d.myInvest),
    liquid: { account: num(d.liquid.account), cash: num(d.liquid.cash), paypal: num(d.liquid.paypal) },
    other: (d.other || []).filter(o => (o.name && o.name.trim()) || num(o.value) !== 0).map(o => ({ name: (o.name || '').trim(), value: num(o.value) })),
    createdAt: d.createdAt || new Date().toISOString()
  };
  const btn = $('#saveBtn');
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await saveEntry(clean);
    clearDraftLocal();
    toast(state.editingId ? 'Eintrag aktualisiert' : 'Eintrag gespeichert');
    state.view = 'home';
    state.draft = null;
    state.editingId = null;
    await refresh();
    try { if (location.hash === '#entry') history.back(); } catch (e) {}
  } catch (err) {
    toast('Fehler beim Speichern');
    btn.disabled = false;
    btn.textContent = 'Speichern';
  }
}

/* ---------- Export / Import ---------- */
function exportJSON() {
  const all = state.entries.map(e => ({
    id: e.id, date: e.date,
    portfolio: e.portfolio, myInvest: e.myInvest, liquid: e.liquid, other: e.other,
    createdAt: e.createdAt, updatedAt: e.updatedAt
  }));
  if (!all.length) { toast('Nichts zu exportieren'); return; }
  const payload = { app: 'networth-tracker', version: 1, exportedAt: new Date().toISOString(), entries: all };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `networth-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast(`${all.length} Einträge exportiert`);
}

$('#fileInput').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    let arr = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : null);
    if (!arr) throw new Error('Ungültiges Format');
    let added = 0, updated = 0, skipped = 0;
    for (const item of arr) {
      if (!item || !item.date) { skipped++; continue; }
      if (!item.id) item.id = uid();
      const normalized = {
        id: item.id, date: item.date,
        portfolio: { total: num(item.portfolio && item.portfolio.total), profit: num(item.portfolio && item.portfolio.profit) },
        myInvest: (item.myInvest === undefined || item.myInvest === null || item.myInvest === '') ? 7000 : num(item.myInvest),
        liquid: { account: num(item.liquid && item.liquid.account), cash: num(item.liquid && item.liquid.cash), paypal: num(item.liquid && item.liquid.paypal) },
        other: Array.isArray(item.other) ? item.other.map(o => ({ name: String(o.name || ''), value: num(o.value) })) : [],
        createdAt: item.createdAt || new Date().toISOString()
      };
      const existed = state.entries.some(x => x.id === normalized.id);
      saveEntry(normalized);
      if (existed) updated++; else added++;
    }
    await refresh();
    toast(`Import: ${added} neu, ${updated} aktualisiert${skipped ? ', ' + skipped + ' übersprungen' : ''}`);
  } catch (err) {
    console.error(err);
    toast('Import fehlgeschlagen: ungültige Datei');
  }
});

/* ---------- Resize ---------- */
let resizeTimer;
window.addEventListener('resize', () => {
  if (state.view !== 'home') return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { const c = $('#chart'); if (c) renderChart(c, state.entries, state.chartMode); }, 120);
});

/* ---------- Boot ---------- */
// Stellt den Start-Screen ein: offener Entwurf > Home
function applyStartView() {
  const saved = loadDraftLocal();
  if (saved) {
    state.draft = saved;
    state.editingId = null;
    state.view = 'entry';
    try { history.pushState({ view: 'entry' }, '', '#entry'); } catch (e) {}
  } else {
    state.view = 'home';
  }
}

state.entries = loadAll();
applyStartView();
render();
</script>
